<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bonnie and Sam are getting married June 14, 2026 in Granbury, TX">
    <title>Bonnie &amp; Sam • June 14, 2026</title>
    <!--<link rel="icon" type="image/svg+xml" href="/logo.svg">-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Libre+Baskerville:wght@400&amp;display=swap');
        
        :root {
            --cream: #f8f4eb;
            --soft-white: #fffaf0;
            --rustic-brown: #5c4634;
            --accent-tan: #8a6f4f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Libre Baskerville', serif;
            background-color: var(--cream);
            color: var(--rustic-brown);
            line-height: 1.6;
            text-align: center;
            overflow-x: hidden;
        }
        
        header {
            padding: 2rem 1rem;
            background-color: var(--soft-white);
            box-shadow: 0 2px 10px rgba(92, 70, 52, 0.1);
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--rustic-brown);
        }
        
        .hero {
            min-height: 65vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            color: var(--rustic-brown);
        }
        
        .subtitle {
            font-size: 1.85rem;
            margin-bottom: 0rem;
            color: var(--accent-tan);
            font-style: italic;
            letter-spacing: 3px;
        }
        
        .coming-soon {
            font-size: 3.2rem;
            font-weight: 400;
            color: var(--rustic-brown);
            margin: 2.5rem 0;
            padding: 1.5rem 3.5rem;
            border: 5px solid var(--accent-tan);
            display: inline-block;
            border-radius: 12px;
            background-color: rgba(255,255,255,0.9);
            letter-spacing: 8px;
            box-shadow: 0 10px 30px rgba(92, 70, 52, 0.1);
        }
        
        .details {
            max-width: 620px;
            margin: 2.5rem auto 0;
            font-size: 1.35rem;
            padding: 0 1rem;
        }
        
        .venue {
            font-size: 1.45rem;
            margin-top: 2rem;
            color: var(--accent-tan);
            font-style: italic;
        }
        
        .rustic-line {
            width: 160px;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--accent-tan), transparent);
            margin: 2.5rem auto;
        }
        
        .tagline {
            margin-top: 3rem;
            font-size: 1.25rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }
        
        footer {
            padding: 2rem 1rem;
            background-color: var(--soft-white);
            font-size: 0.95rem;
            color: var(--accent-tan);
            border-top: 1px solid rgba(140, 111, 79, 0.2);
        }
        
        @media (max-width: 640px) {
            h1 { font-size: 3.8rem; }
            .coming-soon { font-size: 2.4rem; padding: 1rem 2rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <header>
      <div class="logo">
        <h1>Bonnie &amp; Sam</h1>
      </div>
    </header>
    <div class="hero">
        <p class="subtitle">June 14, 2026</p>
        <div class="rustic-line"></div>
        <p class="subtitle">Granbury, TX</p>
        
        <div class="coming-soon">
            COMING SOON
        </div>
        
    </div>
    
    <footer>
        <p style="font-size: 0.85rem;">Built with love by Sam</p>
    </footer>
</body>
</html>
